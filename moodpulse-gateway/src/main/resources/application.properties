spring.application.name=moodpulse-gateway
server.port=8080

# Spotify OAuth
spotify.client-id=${SPOTIFY_CLIENT_ID}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:8080/callback}
spotify.token-url=https://accounts.spotify.com/api/token
spotify.scopes=user-top-read%20user-read-private
spotify.auth-url=https://accounts.spotify.com/authorize


# FastAPI inference server
moodpulse.api.url=${MOODPULSE_API_URL:http://localhost:7860}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5500,https://your-vercel-app.vercel.app}

# Swagger
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/api-docs

# Logging
logging.level.com.moodpulse=DEBUG
